<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dropbox Auth — TikSave</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#070810;color:#eef0ff;
    font-family:'Cairo',sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;flex-direction:column;gap:14px;
    text-align:center;padding:24px;
  }
  .icon{font-size:3rem;margin-bottom:4px;}
  h2{font-size:1.2rem;font-weight:900;}
  p{color:#8891aa;font-size:.85rem;line-height:1.7;max-width:400px;}
  .spinner{
    width:40px;height:40px;border-radius:50%;
    border:3px solid rgba(255,255,255,.1);
    border-top-color:#fe2c55;
    animation:spin .75s linear infinite;
    margin-bottom:8px;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .code-box{
    background:rgba(96,239,255,.08);border:1px solid rgba(96,239,255,.2);
    padding:12px 20px;border-radius:12px;font-family:monospace;
    font-size:.85rem;color:#60efff;word-break:break-all;max-width:500px;
  }
  .err{color:#ff4757;}
</style>
</head>
<body>
<div id="app">
  <div class="spinner"></div>
  <h2>جاري معالجة التفويض…</h2>
  <p>يرجى الانتظار</p>
</div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');
  const app    = document.getElementById('app');

  if(error){
    app.innerHTML = `
      <div class="icon">❌</div>
      <h2>رُفض التفويض</h2>
      <p class="err">${error}</p>
      <p>أغلق هذه النافذة وحاول مرة أخرى.</p>`;
    return;
  }

  if(!code){
    app.innerHTML = `
      <div class="icon">⚠️</div>
      <h2>لم يُعثر على كود</h2>
      <p>أغلق هذه النافذة وحاول مرة أخرى.</p>`;
    return;
  }

  // ── Send code back to opener via postMessage ──
  if(window.opener && !window.opener.closed){
    try{
      window.opener.postMessage({ type:'DROPBOX_AUTH_CODE', code }, window.opener.location.origin);
      app.innerHTML = `
        <div class="icon">✅</div>
        <h2>تم! جاري إغلاق النافذة…</h2>
        <p>تم إرسال الكود للموقع تلقائياً.</p>`;
      setTimeout(()=>window.close(), 1500);
      return;
    }catch(e){
      // Cross-origin fallback — show code manually
    }
  }

  // ── Fallback: show code to copy manually ──
  app.innerHTML = `
    <div class="icon">🔑</div>
    <h2>انسخ هذا الكود</h2>
    <p>ارجع لتبويب TikSave والصقه في الحقل المخصص:</p>
    <div class="code-box" id="codeVal">${code}</div>
    <p style="margin-top:8px;font-size:.75rem;color:#5a607a;">اضغط على الكود لنسخه</p>`;

  document.getElementById('codeVal').addEventListener('click', function(){
    navigator.clipboard.writeText(code).then(()=>{
      this.textContent = '✅ تم النسخ!';
      setTimeout(()=>{ this.textContent = code; }, 2000);
    });
  });
})();
</script>
</body>
</html>
