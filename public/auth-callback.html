<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dropbox Auth</title>
<style>
  body{background:#07080f;color:#eef0ff;font-family:'Cairo',sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh;
    flex-direction:column;gap:16px;text-align:center;padding:20px;}
  code{
    background:rgba(255,255,255,.08);padding:10px 18px;border-radius:10px;
    font-size:1rem;word-break:break-all;max-width:500px;display:block;
    font-family:monospace;color:#60efff;
  }
  p{color:#8891aa;font-size:.9rem;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
</head>
<body>
<div style="font-size:2.5rem;">🔑</div>
<h2 id="title">جاري معالجة التفويض…</h2>
<p id="sub"></p>
<code id="codeBox" style="display:none"></code>
<script>
const params = new URLSearchParams(window.location.search);
const code  = params.get('code');
const error = params.get('error');
if(code){
  document.getElementById('title').textContent = '✅ تم الحصول على الكود';
  document.getElementById('sub').textContent   = 'انسخ هذا الكود وألصقه في النافذة المنبثقة:';
  document.getElementById('codeBox').textContent = code;
  document.getElementById('codeBox').style.display = 'block';
  // Try to auto-close or signal opener
  if(window.opener){
    try{ window.opener.dropboxCode = code; }catch(e){}
  }
} else if(error){
  document.getElementById('title').textContent = '❌ رُفض التفويض';
  document.getElementById('sub').textContent   = error;
} else {
  document.getElementById('title').textContent = 'لم يُعثر على كود';
}
</script>
</body>
</html>
